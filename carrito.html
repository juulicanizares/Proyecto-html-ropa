<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<header class="main-header">
    <h1 class="logo">Carrito</h1>
    <a href="index.html" class="nav-btn">Volver</a>
</header>

<main>

<section>
<article class="cart-item">
    <div class="cart-img">
        <img src="img/producto2.png">
    </div>
    <div class="cart-info">
        <h3>Camiseta</h3>
        <p class="price">$300.000</p>
    </div>
</article>
</section>

<h2>Total: $300.000</h2>


<button class="add-btn" onclick="mostrarCheckout()">
    Continuar con la compra
</button>

<div id="checkout" style="display:none; margin-top:20px;">

<form id="checkoutForm">
    <label for="nombre">Nombre</label>
    <input id="nombre" type="text" placeholder="Tu nombre completo" required>

    <label for="direccion">Dirección</label>
    <input id="direccion" type="text" placeholder="Dirección de envío" required>

    <label for="tarjeta">Tarjeta</label>
    <input id="tarjeta" type="text" placeholder="1234 5678 9012 3456" required minlength="16">

    <button type="submit" class="add-btn">Finalizar compra</button>
</form>

</div>

</main>


<script>
function mostrarCheckout() {
    document.getElementById("checkout").style.display = "block";
}

document.getElementById("checkoutForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const nombre = document.getElementById("nombre").value;
    const direccion = document.getElementById("direccion").value;
    const tarjeta = document.getElementById("tarjeta").value;

    console.log({ nombre, direccion, tarjeta });

    alert("Compra realizada con éxito 🎉");

    this.reset();
});
</script>

</body>
</html>
