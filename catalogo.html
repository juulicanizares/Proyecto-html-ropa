<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>

<body>

<header class="main-header">
    <h1 class="logo">Catálogo</h1>

    <nav class="header-nav">
        <a href="index.html" class="nav-btn">Inicio</a>
        <a href="catalogo.html" class="nav-btn active">Catálogo</a>
        <a href="perfil.html" class="nav-btn">Perfil</a>
        <a href="carrito.html" class="cart-status">🛒 0</a>
    </nav>
</header>

<main>

<h2 class="section-title">Todos los productos</h2>

<div class="filter-wrapper">


    <input type="radio" name="filtro" id="all" checked>
    <input type="radio" name="filtro" id="camisetas">
    <input type="radio" name="filtro" id="hoodies">


    <div class="filter-group">
        <label for="all" class="filter-btn">Todos</label>
        <label for="camisetas" class="filter-btn">Camisetas</label>
        <label for="hoodies" class="filter-btn">Hoodies</label>
    </div>


    <div class="product-grid">


        <article class="product-card camiseta">
            <div class="img-container">
                <a href="producto.html?prod=undgld">
                    <img src="img/producto2.png" alt="Camiseta undergold">
                </a>
            </div>
            <div class="product-info">
                <h3>Camiseta undergold</h3>
                <p class="price">$300.000</p>
                <button class="add-btn">AGREGAR</button>
            </div>
        </article>


        <article class="product-card hoodie">
            <div class="img-container">
                <a href="producto.html?prod=hoodie-clemont">
                    <img src="img/producto3.png" alt="Hoodie clemont">
                </a>
            </div>
            <div class="product-info">
                <h3>Hoodie clemont</h3>
                <p class="price">$400.000</p>
                <button class="add-btn">AGREGAR</button>
            </div>
        </article>


        <article class="product-card camiseta">
            <div class="img-container">
                <a href="producto.html?prod=clemont">
                    <img src="img/producto4.png" alt="Camiseta clemont">
                </a>
            </div>
            <div class="product-info">
                <h3>Camiseta clemont</h3>
                <p class="price">$300.000</p>
                <button class="add-btn">AGREGAR</button>
            </div>
        </article>

        <!-- PRODUCTO 4 -->
        <article class="product-card hoodie">
            <div class="img-container">
                <a href="producto.html?prod=hoodie-undgld">
                    <img src="img/producto1.png" alt="Hoodie UNDGLD">
                </a>
            </div>
            <div class="product-info">
                <h3>Hoodie UNDGLD</h3>
                <p class="price">$550.000</p>
                <button class="add-btn">AGREGAR</button>
            </div>
        </article>

    </div>

</div>

</main>

</body>
</html>
