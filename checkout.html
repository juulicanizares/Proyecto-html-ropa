<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>

  <link rel="stylesheet" href="css/base.css">

  <style>
    body {
      background: #f5f7ff;
      font-family: sans-serif;
    }

    .header {
      padding: 15px;
    }

    .header a {
      text-decoration: none;
      color: #0095ff;
      font-weight: bold;
    }

    main {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .checkout-box {
      background: white;
      padding: 25px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    }

    .checkout-box h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 0.75rem;
      font-weight: bold;
      color: #555;
    }

    input {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 0.85rem;
    }

    input:focus {
      border-color: #0095ff;
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,149,255,0.2);
    }

    button {
      margin-top: 10px;
      background: linear-gradient(135deg, #0095ff, #0066ff);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.85rem;
    }

    button:hover {
      transform: scale(1.03);
    }
  </style>

</head>
<body>

<header class="header">
  <a href="carrito.html">← Volver</a>
</header>

<main>

<div class="checkout-box">

  <h2>Datos de pago</h2>

  <!-- FORMULARIO SIN JS -->
  <form action="gracias.html" method="GET">

    <label>Nombre</label>
    <input type="text" name="nombre" placeholder="Tu nombre completo" required>

    <label>Dirección</label>
    <input type="text" name="direccion" placeholder="Dirección de envío" required>

    <label>Tarjeta</label>
    <input type="text" name="tarjeta" placeholder="1234 5678 9012 3456" required minlength="16">

    <button type="submit">Finalizar compra</button>

  </form>

</div>

</main>

<footer class="footer"></footer>

</body>
</html>
