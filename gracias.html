<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Compra realizada</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">

<style>
body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f5f7ff;
    font-family: sans-serif;
}

.success-box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    max-width: 350px;
}

.success-icon {
    font-size: 50px;
    margin-bottom: 10px;
}

.success-box h1 {
    font-size: 1.3rem;
    margin-bottom: 10px;
}

.success-box p {
    color: #666;
    font-size: 0.9rem;
    margin-bottom: 20px;
}

.btn-volver {
    display: inline-block;
    background: #0095ff;
    color: white;
    padding: 10px 20px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="success-box">
    <div class="success-icon">✅</div>
    <h1>Compra realizada</h1>
    <p>Tu pedido fue procesado con éxito</p>
    <a href="index.html" class="btn-volver">Volver a la tienda</a>
</div>

</body>
</html>
