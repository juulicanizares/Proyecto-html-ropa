<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusShop | App Oficial</title>

    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/layout.css">
    <link rel="stylesheet" href="CSS/components.css">
</head>

<body>

<header class="main-header">
    <h1 class="logo">CampusShop</h1>

    <nav class="header-nav">
        <a href="index.html" class="nav-btn active">Inicio</a>
        <a href="catalogo.html" class="nav-btn">Catálogo</a>
        <a href="perfil.html" class="nav-btn">Perfil</a>
        <a href="carrito.html" class="cart-status">🛒 0</a>
    </nav>
</header>

<main>

    <div class="search-box">
        <input type="text" placeholder="¿Qué quieres comprar hoy?">
    </div>

    <h2 class="section-title">Categorías</h2>

    <div class="filter-wrapper">

        <input type="radio" name="filtro" id="all" checked>
        <input type="radio" name="filtro" id="camisetas">
        <input type="radio" name="filtro" id="hoodies">

        <div class="filter-group">
            <label for="all" class="filter-btn">Todos</label>
            <label for="camisetas" class="filter-btn">Camisetas</label>
            <label for="hoodies" class="filter-btn">Hoodies</label>
        </div>

        <div class="product-grid">

            <!-- PRODUCTO 1 -->
            <article class="product-card camiseta">
                <div class="badge oferta">OFERTA</div>
                <div class="img-container">
                    <a href="producto-undgld.html">
                        <img src="IMG/producto2.png" alt="Camiseta undergold">
                    </a>
                </div>
                <div class="product-info">
                    <h3>Camiseta undergold</h3>
                    <p class="price">$300.000</p>
                    <button class="add-btn">AGREGAR</button>
                </div>
            </article>

            <!-- PRODUCTO 2 -->
            <article class="product-card hoodie">
                <div class="badge stock">NUEVO</div>
                <div class="img-container">
                    <a href="producto-hoodie-clemont.html">
                        <img src="IMG/producto3.png" alt="Hoodie clemont">
                    </a>
                </div>
                <div class="product-info">
                    <h3>Hoodie clemont</h3>
                    <p class="price">$400.000</p>
                    <button class="add-btn">AGREGAR</button>
                </div>
            </article>

            <!-- PRODUCTO 3 -->
            <article class="product-card camiseta">
                <div class="img-container">
                    <a href="producto-clemont.html">
                        <img src="IMG/producto4.png" alt="Camiseta clemont">
                    </a>
                </div>
                <div class="product-info">
                    <h3>Camiseta clemont</h3>
                    <p class="price">$300.000</p>
                    <button class="add-btn">AGREGAR</button>
                </div>
            </article>

            <!-- PRODUCTO 4 -->
            <article class="product-card hoodie">
                <div class="badge oferta">TOP</div>
                <div class="img-container">
                    <a href="producto-hoodie-undgld.html">
                        <img src="IMG/producto1.png" alt="Hoodie UNDGLD">
                    </a>
                </div>
                <div class="product-info">
                    <h3>Hoodie UNDGLD</h3>
                    <p class="price">$550.000</p>
                    <button class="add-btn">AGREGAR</button>
                </div>
            </article>

        </div>

    </div>

</main>

</body>
</html>
